name: Validate

on:
  push:
    branches: [main, 'refactor/**', 'fix/**', 'feat/**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --include=dev --workspaces

      - name: Build workspaces
        run: npm run build

      - name: Lint workspaces
        run: npm run lint --if-present
