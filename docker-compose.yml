services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: score_discador
      POSTGRES_USER: score
      POSTGRES_PASSWORD: score_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U score -d score_discador"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      API_PORT: 4000
      DATABASE_URL: postgresql://score:score_password@postgres:5432/score_discador?schema=public
      JWT_SECRET: change_me
      JWT_EXPIRES_IN: 7d
      VOIP_PROVIDER: mock
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - api_uploads:/app/uploads
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/server.js"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: http://localhost:4000/api
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  api_uploads:
