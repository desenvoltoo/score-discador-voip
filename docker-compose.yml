version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-score_discador}
      POSTGRES_USER: ${POSTGRES_USER:-score}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-score_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-4000}
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://score:score_password@postgres:5432/score_discador?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      VOIP_PROVIDER: ${VOIP_PROVIDER:-mock}
      ASTERISK_HOST: ${ASTERISK_HOST:-}
      ASTERISK_PORT: ${ASTERISK_PORT:-5038}
      ASTERISK_USERNAME: ${ASTERISK_USERNAME:-}
      ASTERISK_PASSWORD: ${ASTERISK_PASSWORD:-}
      ASTERISK_CONTEXT: ${ASTERISK_CONTEXT:-from-internal}
      ASTERISK_TRUNK: ${ASTERISK_TRUNK:-}
      ASTERISK_OPERATOR_PREFIX: ${ASTERISK_OPERATOR_PREFIX:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-4000}:${API_PORT:-4000}"
    volumes:
      - api_uploads:/app/uploads
    command: sh -c "npx prisma migrate deploy --schema prisma/schema.prisma && npx prisma db seed --schema prisma/schema.prisma && node dist/server.js"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$${PORT}/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
  api_uploads:
